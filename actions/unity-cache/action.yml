name: 'Unity Cache'
description: 'Unity Project Cache Control Wrapper.'
author: 'AndanteTribe'
inputs:
  unity-project-path:
    description: 'A directory paths for the Unity project to be cached and restored.'
    required: true
  upload-chunk-size:
    description: 'The chunk size used to split up large files during upload, in bytes. Self-hosted runners are ignored.'
    required: false
  fail-on-cache-miss:
    description: 'Fail the workflow if cache entry is not found.'
    default: 'false'
    required: false
  lookup-only:
    description: 'Check if a cache entry exists for the given input(s) (key, restore-keys) without downloading the cache.'
    default: 'false'
    required: false
  use-nugetforunity:
    description: 'Supports cache resolution and cache management via NuGetForUnity.Cli in Unity projects using NuGetForUnity.'
    default: 'false'
    required: false
  nuget-packages-path:
    description: 'A directory path where NuGetForUnity downloads packages. Used when use-nugetforunity is true.'
    required: false
outputs:
  cache-hit-unity:
    description: 'A boolean value indicating that the cache for the target Unity project has been found.'
  cache-hit-nuget:
    description: 'A boolean value indicating that the NuGet cache for the target Unity project has been found.'
runs:
  using: "composite"
  steps:
    - name: Fetch unity project info
      id: info
      run: |
        docker build -t andantetribe-fetch-unity-info "${{ github.action_path }}/../fetch-unity-info"
        docker run --rm \
          -e UNITY_PROJECT_PATH="${{ inputs.unity-project-path }}" \
          -e GITHUB_WORKSPACE \
          -e GITHUB_OUTPUT \
          -v "${GITHUB_OUTPUT}:${GITHUB_OUTPUT}" \
          andantetribe-fetch-unity-info \
          share/FetchUnityProjectInfo.cs
      shell: bash

    - name: Restore nuget cache
      if: ${{ inputs.use-nugetforunity == 'true' && !contains(runner.labels, 'self-hosted') }}
      id: nuget-cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.nuget-packages-path }}
        key: nuget-cache-${{ steps.info.outputs.name }}
        upload-chunk-size: ${{ inputs.upload-chunk-size }}
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        lookup-only: ${{ inputs.lookup-only }}

    - name: Run NuGetForUnity restore
      if: ${{ inputs.use-nugetforunity == 'true' && steps.nuget-cache.outputs.cache-hit != 'true' }}
      run: |
        docker build -t andantetribe-nugetforunity-restore "${{ github.action_path }}/../nugetforunity-restore"
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
          -e NUGET_PACKAGES="${GITHUB_WORKSPACE}/${{ inputs.nuget-packages-path }}" \
          andantetribe-nugetforunity-restore \
          "${GITHUB_WORKSPACE}/${{ inputs.unity-project-path }}"
      shell: bash

    - name: Restore unity project cache
      if: ${{ !contains(runner.labels, 'self-hosted') }}
      id: unity-cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.unity-project-path }}/Library
        key: unity-cache-${{ steps.info.outputs.name }}
        upload-chunk-size: ${{ inputs.upload-chunk-size }}
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        lookup-only: ${{ inputs.lookup-only }}

    - name: Set outputs
      run: |
        docker build -t andantetribe-set-outputs "${{ github.action_path }}/../set-outputs"
        docker run --rm \
          -e UNITY_CACHE_HIT="${{ steps.unity-cache.outputs.cache-hit }}" \
          -e NUGET_CACHE_HIT="${{ steps.nuget-cache.outputs.cache-hit || 'false' }}" \
          -e GITHUB_OUTPUT \
          -v "${GITHUB_OUTPUT}:${GITHUB_OUTPUT}" \
          andantetribe-set-outputs \
          cache/SetOutputs.cs
      shell: bash