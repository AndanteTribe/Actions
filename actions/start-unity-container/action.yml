name: 'Start Unity Container'
description: 'Launch a Unity editor Docker container with license activation.'
author: 'AndanteTribe'
inputs:
  unity-version:
    description: 'The Unity editor version to use (e.g. 6000.3.2f1).'
    required: true
  target-platform:
    description: 'The target build platform (e.g. linux-il2cpp, windows-mono).'
    required: true
  editor-version:
    description: 'The GameCI Unity editor image version (e.g. 3.2.1). Defaults to 3.2.1 if not specified.'
    required: false
    default: '3.2.1'
  unity-project-path:
    description: 'The path to the Unity project to mount at /workspace inside the container. Relative paths are resolved against the workspace root.'
    required: true
  blank-project-path:
    description: 'The path to use as a blank Unity project for license activation.'
    required: false
    default: '/tmp/BlankProject'
  container-name:
    description: 'The name to assign to the Docker container.'
    required: false
    default: 'unity-agent'
outputs:
  container-id:
    description: 'The ID of the started Docker container.'
runs:
  using: docker
  image: Dockerfile
  env:
    UNITY_VERSION: ${{ inputs.unity-version }}
    TARGET_PLATFORM: ${{ inputs.target-platform }}
    EDITOR_VERSION: ${{ inputs.editor-version }}
    UNITY_PROJECT_PATH: ${{ inputs.unity-project-path }}
    BLANK_PROJECT_PATH: ${{ inputs.blank-project-path }}
    CONTAINER_NAME: ${{ inputs.container-name }}
  args:
    - /app/StartUnityContainer.cs
