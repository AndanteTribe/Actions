name: 'Unity Activate'
description: 'Build and start a Unity editor Docker container with license activation.'
author: 'AndanteTribe'
inputs:
  editor-image:
    description: 'The Unity editor Docker image to use (e.g., unityci/editor:6000.3.2f1-linux-il2cpp-3.2.1).'
    required: true
  blank-project-path:
    description: 'A host directory path to use as the blank Unity project for license activation.'
    required: false
    default: '/tmp/BlankProject'
  container-name:
    description: 'The name for the Unity Docker container.'
    required: false
    default: 'unity-agent'
runs:
  using: "composite"
  steps:
    - name: Build Unity activation image
      shell: bash
      run: |
        docker build \
          --build-arg UNITY_EDITOR_IMAGE="${{ inputs.editor-image }}" \
          -t unity-activate-image \
          "${{ github.action_path }}"

    - name: Start Unity container
      shell: bash
      env:
        CONTAINER_NAME: ${{ inputs.container-name }}
        BLANK_PROJECT_PATH: ${{ inputs.blank-project-path }}
      run: |
        docker run -d \
          --name "$CONTAINER_NAME" \
          -e UNITY_SERIAL \
          -e UNITY_EMAIL \
          -e UNITY_PASSWORD \
          -v "${BLANK_PROJECT_PATH}:/BlankProject" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          unity-activate-image

    - name: Verify Unity container started
      shell: bash
      env:
        CONTAINER_NAME: ${{ inputs.container-name }}
      run: |
        if ! docker inspect --format='{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null | grep -q "true"; then
          echo "::error::Unity container '$CONTAINER_NAME' failed to start."
          docker logs "$CONTAINER_NAME" 2>&1 || true
          exit 1
        fi
